<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}"> 
    <script defer src= "{{url_for('static', filename = 'logic.js') }}"> </script>
    
</head>
<body>
     <h1 class="main-heading">AI Personal Assistant</h1>

     <div class="container">

        <h2>Ask Anything</h2>
        <form id="askForm">
            <input type="text" name = 'question' placeholder="Ask Anything..." required>
            <button type="submit">Ask</button>
        </form>
        <p id="answer-loading" style="display: none;">Processing....</p>
        <p id="answer"></p>

        <hr>

        <h2>Summarize Email</h2>
        <form id = 'emailForm'>
            <textarea type = 'text' name="email" placeholder="Past your email here" required></textarea>
            <button type="submit">Summarize</button>
        </form>
        <p id="summary-loading" style="display: none;">Processing</p> 
        <p id="summary"></p>
     </div>
     
</body>
</html>
